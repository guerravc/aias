- name: Checkout Origen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Volvemos a true para que el checkout no falle, 
          # pero lo ignoraremos en el paso del push.
          persist-credentials: true 

      - name: Mirror Push al Destino
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          # 1. Limpiamos cualquier configuración de persistencia previa para evitar el 403
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          # 2. Construimos la URL con el token directamente
          # Nota: Usamos 'x-access-token' que es el estándar para Fine-grained PATs
          DEST_URL="https://x-access-token:${BACKUP_TOKEN}@github.com/guerravc/rho-aias.git"
          
          # 3. Agregamos el remoto y ejecutamos el mirror
          git remote add backup "$DEST_URL"
          git push --mirror backup
