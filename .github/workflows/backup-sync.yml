name: Mirror Backup Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror_backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Origen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Mirror Push al Destino
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          # 1. Limpiar credenciales del checkout para evitar conflicto 403
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          # 2. Configurar el remoto de destino
          DEST_URL="https://x-access-token:${BACKUP_TOKEN}@github.com/guerravc/aias.git"
          git remote add backup "$DEST_URL"
          
          # 3. Ejecutar mirror
          git push --mirror backup
