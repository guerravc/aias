- name: Checkout Origen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CRÍTICO: Desactivamos las credenciales automáticas 
          # para que no interfieran con tu PAT en el push.
          persist-credentials: false 

      - name: Mirror Push al Destino
        env:
          # Asegúrate de que el secreto se llame exactamente BACKUP_TOKEN
          GITHUB_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          # Usamos la sintaxis de autenticación por token
          DEST_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/guerravc/rho-aias.git"
          
          git remote add backup "$DEST_URL"
          
          # Push mirror
          git push --mirror backup
